version: 1
frontend:
  phases:
    preBuild:
      commands:
        - echo "Use Node 20"
        - nvm install 20 || true
        - nvm use 20 || true
        - node -v
        - npm -v
        - npm install -g npm@latest
        - cd artifacts/mockup-sandbox
        - npm install --legacy-peer-deps --loglevel verbose
    build:
      commands:
        - export npm_config_build_from_source=false
        - export NODE_OPTIONS="--max_old_space_size=4096"
        - cd artifacts/mockup-sandbox
        - npm run build -- --verbose
  artifacts:
    baseDirectory: artifacts/mockup-sandbox/dist
    files:
      - '**/*'
  cache:
    paths:
      - artifacts/mockup-sandbox/node_modules/**/*
