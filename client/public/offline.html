<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>أويو بلاست — غير متصل</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #f2f2f7;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 24px;
      color: #1c1c1e;
    }
    .card {
      background: #fff;
      border-radius: 20px;
      padding: 40px 32px;
      text-align: center;
      max-width: 360px;
      width: 100%;
      box-shadow: 0 4px 24px rgba(0,0,0,0.08);
    }
    img { width: 100px; height: 100px; border-radius: 20px; margin-bottom: 24px; }
    h1 { font-size: 20px; font-weight: 700; margin-bottom: 8px; color: #1c1c1e; }
    p  { font-size: 14px; color: #6e6e73; line-height: 1.6; margin-bottom: 28px; }
    button {
      background: linear-gradient(135deg, #06B6D4, #0891b2);
      color: #fff;
      border: none;
      border-radius: 14px;
      padding: 14px 32px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      width: 100%;
    }
    button:active { opacity: 0.85; }
  </style>
</head>
<body>
  <div class="card">
    <img src="/icons/icon-192x192.png" alt="أويو بلاست" />
    <h1>لا يوجد اتصال بالإنترنت</h1>
    <p>تحقق من اتصالك بالإنترنت وحاول مرة أخرى</p>
    <button onclick="window.location.reload()">إعادة المحاولة</button>
  </div>
</body>
</html>
